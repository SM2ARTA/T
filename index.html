/* ═══════════════════ MSR (SHIPMENT) DASHBOARD ═══════════════════ */
function MsrDash(p){
  var shipments=p.shipments,clock=p.clock;

  var st=useMemo(function(){
    if(!shipments||!shipments.length)return null;
    var total=shipments.length,totalQty=0,totalPallets=0,totalContainers=0,recentYes=0;

    shipments.forEach(function(s){

      byStatus[s.status]=(byStatus[s.status]||0)+1;
      if(s.recentUpdate==="Yes")recentYes++;

    /* Group by planned delivery date */
    var dateGroups={};
    shipments.forEach(function(s){
      var dk=s.plannedDel||"TBC";
      if(!dateGroups[dk])dateGroups[dk]={date:dk,containers:{},localItems:[],totalQty:0,totalPallets:0,statuses:{}};
      var g=dateGroups[dk];
      g.totalQty+=s.totalQty;g.totalPallets+=s.totalPallets;
      g.statuses[s.status]=(g.statuses[s.status]||0)+1;
      if(s.containerNum){
        if(!g.containers[s.containerNum])g.containers[s.containerNum]={num:s.containerNum,items:[],shipName:s.name,status:s.status,time:s.delTime,shipType:s.shipType,hbl:s.hbl,pod:s.pod};
        g.containers[s.containerNum].items.push({product:s.product,qty:s.totalQty,pallets:Math.round(s.totalPallets),sku:s.sku});
      } else {
        g.localItems.push({product:s.product,qty:s.totalQty,pallets:Math.round(s.totalPallets),name:s.name,status:s.status,time:s.delTime});
      }

/* ═══════════════════ LOAD PLAN AGGREGATOR ═══════════════════ */
function aggregateLoadPlan(rows,nomenArr){
  /* Build pallet lookup from nomenclature: code -> {qty, spaces} */
  var palMap={};
  if(nomenArr){nomenArr.forEach(function(n){
    if(!n.code)return;
    var qty=n.palQtyA||n.palQtyD||0;
    var sp=n.palSpA||n.palSpD||0;
    if(qty>0&&sp>0)palMap[n.code]={qty:qty,sp:sp};
  });}

  var agg={total:{lines:rows.length,requested:0,available:0,pallets:0,palletsAvail:0},byVenue:{},byProject:{},byItem:{},byCluster:{},byStatus:{},byVenueTop:[],hasPallets:Object.keys(palMap).length>0};
  rows.forEach(function(r){
    var req=Number(r["Requested"])||0,avail=Number(r["Available materials"])||0;
    var nomCode=r["Nomenclature"]||"";
    var pal=palMap[nomCode];
    var reqPal=0,availPal=0;
    if(pal){reqPal=Math.ceil(req/pal.qty)*pal.sp;availPal=Math.ceil(avail/pal.qty)*pal.sp;}

    agg.total.requested+=req;agg.total.available+=avail;agg.total.pallets+=reqPal;agg.total.palletsAvail+=availPal;
    var pairs=[["byVenue",r["Venue"]||"?"],["byProject",r["Project"]||"?"],["byItem",r["Item"]||"?"],["byCluster",r["Venue cluster"]||"?"]];
    pairs.forEach(function(p){var key=p[0],val=p[1];if(!agg[key][val])agg[key][val]={req:0,avail:0,lines:0,pallets:0,palletsAvail:0};agg[key][val].req+=req;agg[key][val].avail+=avail;agg[key][val].lines+=1;agg[key][val].pallets+=reqPal;agg[key][val].palletsAvail+=availPal;});
    var s=r["Status"]||"?";agg.byStatus[s]=(agg.byStatus[s]||0)+1;
  });
  agg.byVenueTop=Object.entries(agg.byVenue).map(function(en){return{name:en[0],req:en[1].req,avail:en[1].avail,lines:en[1].lines,pallets:en[1].pallets,palletsAvail:en[1].palletsAvail};}).sort(function(a,b){return b.req-a.req;});
  return agg;
}

var BUCKET="dashboard-files";

/* List files in the storage bucket */
function sbListFiles(){
  return fetch(SB_URL+"/storage/v1/object/list/"+BUCKET,{
    method:"POST",headers:{"Content-Type":"application/json",apikey:SB_KEY,Authorization:"Bearer "+SB_KEY},
    body:JSON.stringify({prefix:"",limit:50,offset:0,sortBy:{column:"updated_at",order:"desc"}})
  }).then(function(r){return r.json();}).then(function(arr){return Array.isArray(arr)?arr:[];}).catch(function(){return[];});
}

/* Download a file from the bucket */
function sbDownloadFile(name){
  return fetch(SB_URL+"/storage/v1/object/"+BUCKET+"/"+encodeURIComponent(name),{
    headers:{apikey:SB_KEY,Authorization:"Bearer "+SB_KEY}
  }).then(function(r){if(!r.ok)throw new Error("Download "+r.status);return r.arrayBuffer();});
}

/* Upload URL for Power Automate instructions */
function sbUploadUrl(filename){return SB_URL+"/storage/v1/object/"+BUCKET+"/"+filename;}

/* ═══════════════════ MAIN APP ═══════════════════ */
function App(){
  /* Auth - must be FIRST hook, but no early return before other hooks */
  var _a=useState(_wasAuthed),authed=_a[0],setAuthed=_a[1];

  /* Tab state */
  var _tab=useState(0),tab=_tab[0],setTab=_tab[1];
  var _auto=useState(true),autoRotate=_auto[0],setAutoRotate=_auto[1];
  var ROTATE_MS=5*60*1000;

  /* Clock */
  var _c=useState(new Date()),clock=_c[0],setClock=_c[1];
  var _sbOk=useState(false),sbOk=_sbOk[0],setSbOk=_sbOk[1];

  /* Inventory state */
  var _stk=useState(null),stock=_stk[0],setStock=_stk[1];
  var _nom=useState(null),nomen=_nom[0],setNomen=_nom[1];
  var _fnI=useState({s:"",n:""}),fnamesInv=_fnI[0],setFnamesInv=_fnI[1];
  var _uI=useState(null),updatedInv=_uI[0],setUpdatedInv=_uI[1];
  var _mI=useState(""),invMsg=_mI[0],setInvMsg=_mI[1];

  /* Ops state */
  var _txn=useState(null),txns=_txn[0],setTxns=_txn[1];
  var _fnO=useState(""),fnameOps=_fnO[0],setFnameOps=_fnO[1];
  var _uO=useState(null),updatedOps=_uO[0],setUpdatedOps=_uO[1];

  /* MSR (Shipment) state */
  var _msr=useState(null),shipments=_msr[0],setShipments=_msr[1];
  var _uM=useState(null),updatedMsr=_uM[0],setUpdatedMsr=_uM[1];

  /* Load Plan state */
  var _lp=useState(null),loadPlan=_lp[0],setLoadPlan=_lp[1];
  var _uL=useState(null),updatedLp=_uL[0],setUpdatedLp=_uL[1];

  /* Settings */
  var _showS=useState(false),showSettings=_showS[0],setShowSettings=_showS[1];
  var _cfg=useState({enabled:false,interval:5}),cfg=_cfg[0],setCfg=_cfg[1];
  var _spMsg=useState(""),spMsg=_spMsg[0],setSpMsg=_spMsg[1];
  /* Track last-seen file sizes to detect changes */
  var lastModRef=useRef({inv:"",ops:""});

  /* Timer for next rotation */
  var _rotTm=useState(ROTATE_MS/1000),rotTm=_rotTm[0],setRotTm=_rotTm[1];

  /* Rotation ref */
  var rotRef=useRef(ROTATE_MS/1000);

  /* Load saved config once */
  useEffect(function(){
    try{var s=window.localStorage.getItem("wh_dash_cfg");if(s){var p=JSON.parse(s);if(p)setCfg(p);}}catch(ex){}
  },[]);

  /* Clock tick */
  useEffect(function(){var t=setInterval(function(){setClock(new Date());},1000);return function(){clearInterval(t);};},[]);

  /* Auto-rotate */
  useEffect(function(){
    if(!autoRotate||!authed)return;
    rotRef.current=ROTATE_MS/1000;
    setRotTm(ROTATE_MS/1000);
    var countdown=setInterval(function(){
      rotRef.current=rotRef.current-1;
      if(rotRef.current<=0){
        setTab(function(t){return(t+1)%4;});
        rotRef.current=ROTATE_MS/1000;
      }
      setRotTm(rotRef.current);
    },1000);
    return function(){clearInterval(countdown);};
  },[autoRotate,authed]);

  /* Initial load from Supabase */
  useEffect(function(){
    if(!authed)return;
    Promise.all([sbLoadInv(),sbLoadOps(),sbLoadMsr(),sbLoadLp()]).then(function(res){
      var inv=res[0],ops=res[1],msr=res[2],lpd=res[3];
      if(inv&&inv.data){if(inv.data.stock)setStock(inv.data.stock);if(inv.data.nomen)setNomen(inv.data.nomen);if(inv.data.fnames)setFnamesInv(inv.data.fnames);setUpdatedInv(inv.updated_at);}
      if(ops&&ops.data&&ops.data.txns){setTxns(ops.data.txns.map(function(t){var tp=t.type;if(tp==="Stock correction")tp="Outbound";return Object.assign({},t,{type:tp});}));setFnameOps(ops.data.fname||"");setUpdatedOps(ops.updated_at);}
      if(msr&&msr.data&&msr.data.shipments){setShipments(msr.data.shipments);setUpdatedMsr(msr.updated_at);}
      if(lpd&&lpd.data){setLoadPlan(lpd.data);setUpdatedLp(lpd.updated_at);}
      setSbOk(true);
    }).catch(function(){setSbOk(true);});
  },[authed]);

  /* Auto-refresh from Supabase every 60s */
  useEffect(function(){
    if(!authed)return;
    var t=setInterval(function(){
      sbLoadInv().then(function(inv){if(inv&&inv.data){if(inv.data.stock)setStock(inv.data.stock);if(inv.data.nomen)setNomen(inv.data.nomen);if(inv.data.fnames)setFnamesInv(inv.data.fnames);setUpdatedInv(inv.updated_at);}});
      sbLoadOps().then(function(ops){if(ops&&ops.data&&ops.data.txns){setTxns(ops.data.txns.map(function(t2){var tp=t2.type;if(tp==="Stock correction")tp="Outbound";return Object.assign({},t2,{type:tp});}));setFnameOps(ops.data.fname||"");setUpdatedOps(ops.updated_at);}});
      sbLoadMsr().then(function(msr){if(msr&&msr.data&&msr.data.shipments){setShipments(msr.data.shipments);setUpdatedMsr(msr.updated_at);}});
      sbLoadLp().then(function(lpd){if(lpd&&lpd.data){setLoadPlan(lpd.data);setUpdatedLp(lpd.updated_at);}});
    },60000);
    return function(){clearInterval(t);};
  },[authed]);

  /* ── Parse downloaded buffers ── */
  function parseInvBuffer(buf){
    try{
      var wb=XLSX.read(new Uint8Array(buf),{type:"array"});
      var sheet=wb.Sheets[wb.SheetNames[0]];
      var rows=XLSX.utils.sheet_to_json(sheet,{defval:null});
      if(!rows.length)return;
      var cols=Object.keys(rows[0]);
      if((cols.indexOf("Asset owner")>=0||cols.indexOf("Day in stock")>=0)&&cols.indexOf("Item price, USD")<0){
        var newStock=rows.map(function(r2){return{code:r2["Nomenclature code"],name:r2["Nomenclature name"],owner:r2["Asset owner"],source:r2["Source"],stock:r2["Stock"]||0,reserve:r2["Reserve"]||0,available:r2["Available"]||0,uom:r2["UoM"],days:r2["Day in stock"]||0};});
        setStock(newStock);sbSaveInv({stock:newStock,nomen:nomen,fnames:fnamesInv});setUpdatedInv(new Date().toISOString());
        setSpMsg("Stock synced");setTimeout(function(){setSpMsg("");},4000);
      } else if(cols.indexOf("Item price, USD")>=0||cols.indexOf("Nomenclature type")>=0){
        var newNom=rows.map(function(r2){return{code:r2["Nomenclature code"],name:r2["Nomenclature name"],type:r2["Nomenclature type"],price:r2["Item price, USD"]||0,source:r2["Source"],country:r2["Country of origin"],palQtyA:Number(r2["Pallet quantity, assembled"])||0,palSpA:Number(r2["Pallet spaces, assembled"])||0,palQtyD:Number(r2["Pallet quantity, disassembled"])||0,palSpD:Number(r2["Pallet spaces, disassembled"])||0};});
        setNomen(newNom);sbSaveInv({stock:stock,nomen:newNom,fnames:fnamesInv});setUpdatedInv(new Date().toISOString());
        setSpMsg("Catalog synced");setTimeout(function(){setSpMsg("");},4000);
      }
    }catch(ex){console.warn("Parse inv error:",ex);}
  }
  function parseOpsBuffer(buf){
    try{
      var wb=XLSX.read(new Uint8Array(buf),{type:"array"});
      var sheet=wb.Sheets[wb.SheetNames[0]];
      var rows=XLSX.utils.sheet_to_json(sheet,{defval:null}).map(mapRow);
      if(!rows.length)return;
      setTxns(rows);setFnameOps("SharePoint");sbSaveOps({txns:rows,fname:"SharePoint"});setUpdatedOps(new Date().toISOString());
      setSpMsg("Ops synced");setTimeout(function(){setSpMsg("");},4000);
    }catch(ex){console.warn("Parse ops error:",ex);}
  }

  /* ── Poll Supabase Storage bucket for files from Power Automate ── */
  useEffect(function(){
    if(!authed||!cfg.enabled)return;
    var active=true;
    var intervalMs=(cfg.interval||5)*60*1000;

    function doPoll(){
      if(!active)return;
      sbListFiles().then(function(files){
        if(!files.length)return;
        files.forEach(function(f){
          if(!f.name)return;
          var key=f.name+"|"+f.updated_at;
          var isInv=f.name.toLowerCase().indexOf("inventory")>=0||f.name.toLowerCase().indexOf("stock")>=0||f.name.toLowerCase().indexOf("nomenclature")>=0||f.name.toLowerCase().indexOf("catalog")>=0;
          var isOps=f.name.toLowerCase().indexOf("operation")>=0||f.name.toLowerCase().indexOf("transaction")>=0;
          /* Default: first file found = inventory, named "operations.*" = ops */
          if(!isInv&&!isOps){
            if(f.name==="inventory.xlsx"||f.name==="inventory.csv")isInv=true;
            else if(f.name==="operations.xlsx"||f.name==="operations.csv")isOps=true;
            else isInv=true;/* fallback */
          }
          if(isInv&&lastModRef.current.inv!==key){
            lastModRef.current.inv=key;
            sbDownloadFile(f.name).then(function(buf){parseInvBuffer(buf);}).catch(function(err){console.warn("DL inv:",err);});
          }
          if(isOps&&lastModRef.current.ops!==key){
            lastModRef.current.ops=key;
            sbDownloadFile(f.name).then(function(buf){parseOpsBuffer(buf);}).catch(function(err){console.warn("DL ops:",err);});
          }
        });
      }).catch(function(err){console.warn("Storage poll error:",err);});
    }

    doPoll();
    var t=setInterval(doPoll,intervalMs);
    return function(){active=false;clearInterval(t);};
  },[authed,cfg.enabled,cfg.interval]);

  /* File handlers */
  function handleInvFiles(ev){
    var files=ev.target.files;if(!files||!files.length)return;
    var pending=files.length,newStock=null,newNomen=null,newFn=Object.assign({},fnamesInv);
    function finish(){pending--;if(pending>0)return;if(newStock)setStock(newStock);if(newNomen)setNomen(newNomen);setFnamesInv(newFn);setUpdatedInv(new Date().toISOString());sbSaveInv({stock:newStock||stock,nomen:newNomen||nomen,fnames:newFn});setInvMsg(newStock&&newNomen?"Both loaded":newStock?"Stock loaded":"Catalog loaded");setTimeout(function(){setInvMsg("");},3000);}
    Array.from(files).forEach(function(file){
      var reader=new FileReader();reader.onload=function(evt){
        try{var wb=XLSX.read(new Uint8Array(evt.target.result),{type:"array"});var sheet=wb.Sheets[wb.SheetNames[0]];var rows=XLSX.utils.sheet_to_json(sheet,{defval:null});if(!rows.length){finish();return;}var cols=Object.keys(rows[0]);
          if((cols.indexOf("Asset owner")>=0||cols.indexOf("Day in stock")>=0)&&cols.indexOf("Item price, USD")<0){newStock=rows.map(function(r2){return{code:r2["Nomenclature code"],name:r2["Nomenclature name"],owner:r2["Asset owner"],source:r2["Source"],stock:r2["Stock"]||0,reserve:r2["Reserve"]||0,available:r2["Available"]||0,uom:r2["UoM"],days:r2["Day in stock"]||0};});newFn.s=file.name;}
          else if(cols.indexOf("Item price, USD")>=0||cols.indexOf("Nomenclature type")>=0){newNomen=rows.map(function(r2){return{code:r2["Nomenclature code"],name:r2["Nomenclature name"],type:r2["Nomenclature type"],price:r2["Item price, USD"]||0,source:r2["Source"],country:r2["Country of origin"],palQtyA:Number(r2["Pallet quantity, assembled"])||0,palSpA:Number(r2["Pallet spaces, assembled"])||0,palQtyD:Number(r2["Pallet quantity, disassembled"])||0,palSpD:Number(r2["Pallet spaces, disassembled"])||0};});newFn.n=file.name;}
        }catch(err){console.error(err);}finish();};reader.readAsArrayBuffer(file);
    });ev.target.value="";}

  function handleOpsFile(ev){
    var file=ev.target.files&&ev.target.files[0];if(!file)return;
    var reader=new FileReader();reader.onload=function(evt){
      try{var rows;if(file.name.match(/\.csv$/i)){var result=Papa.parse(evt.target.result,{header:true,skipEmptyLines:true});rows=result.data.map(mapRow);}else{var data=new Uint8Array(evt.target.result);var wb=XLSX.read(data,{type:"array"});var sheet=wb.Sheets[wb.SheetNames[0]];rows=XLSX.utils.sheet_to_json(sheet,{defval:null}).map(mapRow);}
        setTxns(rows);setFnameOps(file.name);var now=new Date().toISOString();setUpdatedOps(now);sbSaveOps({txns:rows,fname:file.name});
      }catch(err){console.error(err);}
    };if(file.name.match(/\.csv$/i))reader.readAsText(file);else reader.readAsArrayBuffer(file);ev.target.value="";}

  function handleMsrFile(ev){
    var file=ev.target.files&&ev.target.files[0];if(!file)return;
    var reader=new FileReader();reader.onload=function(evt){
      try{
        var data=new Uint8Array(evt.target.result);
        var wb=XLSX.read(data,{type:"array",cellDates:true});
        var sheet=wb.Sheets[wb.SheetNames[0]];
        /* Headers are in row 3 (A3), data starts row 4 */
        var allRows=XLSX.utils.sheet_to_json(sheet,{defval:null,range:2});
        var mapped=allRows.filter(function(r2){return r2["Name"]&&String(r2["Name"]).trim()!=="";}).map(mapMsrRow);
        if(mapped.length>0){
          setShipments(mapped);var now=new Date().toISOString();setUpdatedMsr(now);
          sbSaveMsr({shipments:mapped});
          setInvMsg("MSR: "+mapped.length+" shipments");setTimeout(function(){setInvMsg("");},3000);
        }
      }catch(err){console.error("MSR parse error:",err);}
    };reader.readAsArrayBuffer(file);ev.target.value="";}

  function handleLpFile(ev){
    var file=ev.target.files&&ev.target.files[0];if(!file)return;
    var reader=new FileReader();reader.onload=function(evt){
      try{
        var data=new Uint8Array(evt.target.result);
        var wb=XLSX.read(data,{type:"array"});
        var sheet=wb.Sheets[wb.SheetNames[0]];
        var rows=XLSX.utils.sheet_to_json(sheet,{defval:null});
        if(rows.length>0){
          var agg=aggregateLoadPlan(rows,nomen);
          setLoadPlan(agg);var now=new Date().toISOString();setUpdatedLp(now);
          sbSaveLp(agg);
          setInvMsg("Load Plan: "+rows.length+" lines");setTimeout(function(){setInvMsg("");},3000);
        }
      }catch(err){console.error("LP parse error:",err);}
    };reader.readAsArrayBuffer(file);ev.target.value="";}

  function saveCfg(newCfg){
    setCfg(newCfg);
    try{window.localStorage.setItem("wh_dash_cfg",JSON.stringify(newCfg));}catch(ex){}
  }

  /* ── AUTH GATE: render password screen if not authed ── */
  if(!authed)return e(PasswordGate,{onAuth:function(){setAuthed(true);}});

  /* Format countdown */
  var rotMin=Math.floor(rotTm/60),rotSec=rotTm%60;
  var rotStr=String(rotMin)+":"+(rotSec<10?"0":"")+String(rotSec);

  var tabs=[
    {label:"Inventory",icon:"I",color:TEAL},
    {label:"Operations",icon:"O",color:GD},
    {label:"Shipments",icon:"S",color:BRAND},
    {label:"Load Plan",icon:"L",color:OR}
  ];

  return e("div",{style:{height:"100vh",display:"flex",flexDirection:"column",background:BG,color:TX,overflow:"hidden"}},
    showSettings?e(SettingsPanel,{cfg:cfg,onSave:saveCfg,onClose:function(){setShowSettings(false);}}):null,

    /* HEADER */
    e("header",{style:{padding:"0.3vh 0.8vw",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1px solid "+BD,background:S1,flexShrink:0,height:"3.2vh",minHeight:28}},
      /* Left: logo + tabs */
      e("div",{style:{display:"flex",alignItems:"center",gap:"0.8vw"}},
        e("div",{style:{display:"flex",alignItems:"center",gap:"0.3vw"}},
          e(Logo,{size:18,dark:true,style:{minWidth:18,minHeight:18}}),
          e("div",{style:{fontSize:"min(0.65vw,11px)",fontWeight:700,lineHeight:1.1}},e("div",null,"SM\u00b2ARTA Dash"),e("div",{style:{fontSize:"min(0.35vw,6px)",color:TD}},"Warehouse Intelligence"))
        ),
        /* Tab buttons */
        e("div",{style:{display:"flex",gap:2,marginLeft:"0.5vw"}},tabs.map(function(tb,i){
          var active=tab===i;
          return e("button",{key:i,onClick:function(){setTab(i);setAutoRotate(false);setRotTm(ROTATE_MS/1000);setTimeout(function(){setAutoRotate(true);},100);},
            style:{background:active?tb.color+"22":"transparent",border:active?"1px solid "+tb.color+"44":"1px solid transparent",borderRadius:5,padding:"0.15vh 0.6vw",display:"flex",alignItems:"center",gap:4,cursor:"pointer",transition:"all .2s"}},
            e("span",{style:{width:12,height:12,borderRadius:3,background:active?tb.color:TM,display:"flex",alignItems:"center",justifyContent:"center",fontSize:7,fontWeight:800,color:BG}},tb.icon),
            e("span",{style:{fontSize:"min(0.5vw,9px)",fontWeight:active?700:500,color:active?tb.color:TD}},tb.label)
          );
        }))
      ),
      /* Right: controls */
      e("div",{style:{display:"flex",alignItems:"center",gap:"0.6vw"}},
        /* Auto-rotate indicator */
        e("div",{style:{display:"flex",alignItems:"center",gap:4,fontSize:"min(0.4vw,7px)",color:autoRotate?TEAL:TM,cursor:"pointer"},onClick:function(){setAutoRotate(!autoRotate);}},
          e("span",{style:{width:5,height:5,borderRadius:"50%",background:autoRotate?TEAL:TM,display:"inline-block",animation:autoRotate?"pulse 2s infinite":"none"}}),
          autoRotate?"Next: "+rotStr:"Auto paused"
        ),
        /* Data status */
        e("div",{style:{display:"flex",gap:"0.3vw",fontSize:"min(0.38vw,6px)"}},
          e("span",{style:{color:stock?GR:TM}},stock?"\u2713Inv":"\u25CBInv"),
          e("span",{style:{color:txns?GR:TM}},txns?"\u2713Ops":"\u25CBOps"),
          e("span",{style:{color:shipments?GR:TM}},shipments?"\u2713MSR":"\u25CBMSR"),
          e("span",{style:{color:loadPlan?GR:TM}},loadPlan?"\u2713LP":"\u25CBLP")
        ),
        invMsg?e("span",{style:{fontSize:"min(0.38vw,6px)",color:GR,fontWeight:600}},invMsg):null,
        spMsg?e("span",{style:{fontSize:"min(0.38vw,6px)",color:BL,fontWeight:600}},spMsg):null,
        cfg.enabled?e("span",{style:{fontSize:"min(0.35vw,6px)",color:GR}},"\u25CF SP Sync"):null,
        /* Upload for current tab */
        tab===0?e("label",{style:{background:S2,border:"1px solid "+BD,borderRadius:4,padding:"0.15vh 0.4vw",color:TEAL,fontSize:"min(0.42vw,7px)",fontWeight:600,cursor:"pointer"}},"\u2191 Inventory",e("input",{type:"file",accept:".xlsx,.xls,.csv",multiple:true,onChange:handleInvFiles,style:{display:"none"}})):
        tab===1?e("label",{style:{background:S2,border:"1px solid "+BD,borderRadius:4,padding:"0.15vh 0.4vw",color:GD,fontSize:"min(0.42vw,7px)",fontWeight:600,cursor:"pointer"}},"\u2191 Operations",e("input",{type:"file",accept:".xlsx,.xls,.csv",onChange:handleOpsFile,style:{display:"none"}})):
        tab===2?e("label",{style:{background:S2,border:"1px solid "+BD,borderRadius:4,padding:"0.15vh 0.4vw",color:BRAND,fontSize:"min(0.42vw,7px)",fontWeight:600,cursor:"pointer"}},"\u2191 MSR",e("input",{type:"file",accept:".xlsx,.xls",onChange:handleMsrFile,style:{display:"none"}})):
        e("label",{style:{background:S2,border:"1px solid "+BD,borderRadius:4,padding:"0.15vh 0.4vw",color:OR,fontSize:"min(0.42vw,7px)",fontWeight:600,cursor:"pointer"}},"\u2191 Load Plan",e("input",{type:"file",accept:".xlsx,.xls",onChange:handleLpFile,style:{display:"none"}})),
        /* Settings gear */
        e("button",{onClick:function(){setShowSettings(true);},style:{background:"transparent",border:"1px solid "+BD,borderRadius:4,padding:"0.15vh 0.3vw",color:TD,fontSize:"min(0.5vw,9px)",cursor:"pointer",lineHeight:1}},"\u2699"),
        e("div",{style:{fontFamily:"monospace",fontSize:"min(0.7vw,11px)",fontWeight:700,color:tabs[tab].color}},clock.toLocaleTimeString("en-US",{hour12:false})),
        e("div",{style:{width:5,height:5,borderRadius:"50%",background:sbOk?GR:AM}})
      )
    ),

    /* MAIN CONTENT */
    e("main",{style:{flex:1,padding:"0.4vh 0.5vw",display:"flex",flexDirection:"column",gap:"0.3vh",overflow:"hidden",minHeight:0}},
      tab===0?e(InventoryDash,{stock:stock,nomen:nomen,updatedInv:updatedInv,handleInvFiles:handleInvFiles,invMsg:invMsg,sbOk:sbOk,clock:clock}):
      tab===1?e(OpsDash,{txns:txns,updatedOps:updatedOps,handleOpsFile:handleOpsFile,sbOk:sbOk,clock:clock}):
      tab===2?e(MsrDash,{shipments:shipments,updatedMsr:updatedMsr,handleMsrFile:handleMsrFile,clock:clock}):
      e(LoadPlanDash,{loadPlan:loadPlan,updatedLp:updatedLp,handleLpFile:handleLpFile,clock:clock})
    ),

    /* FOOTER */
    e("footer",{style:{padding:"0.15vh 1vw",borderTop:"1px solid "+BD,display:"flex",justifyContent:"space-between",fontSize:"min(0.4vw,7px)",color:TM,flexShrink:0,height:"2vh",minHeight:16,alignItems:"center"}},
      e("span",null,"\u00a92026 Vladislav Abramov | SM\u00b2ARTA\u2122 licensed to SM2ARTA LLC"),
      e("span",{style:{display:"flex",alignItems:"center",gap:8}},
        e("span",null,sbOk?"\u25CF Supabase":"\u25CB Connecting"),
        cfg.enabled?e("span",{style:{color:GR}},"\u25CF SP Sync ("+cfg.interval+"min)"):null,
        e("span",null,"Auto-refresh: 60s")
      ),
      e("span",null,clock.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"}))
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App));
})();
</script>
</body>
</html>
