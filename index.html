/* ── SVG Timeline ─────────────────────────────────────── */
function Timeline(p){

    if(!ref.current)return;

    measure();

  },[]);
  var data=p.data;if(!data.length)return e("div",{ref:ref,style:{width:"100%",height:"100%"}});
  var types=["Inbound","Outbound","Moving","Damage report"];
  var maxVal=0;data.forEach(function(d){var s=0;types.forEach(function(t){s+=d[t]||0;});if(s>maxVal)maxVal=s;});if(!maxVal)maxVal=1;
  var W=sz.w,H=sz.h,padB=18,padT=4,chartH=H-padB-padT;
  var gap=2,barW=Math.max(Math.floor((W-gap*(data.length-1))/data.length),4);
  var cols=[CY,AM,PU,RD];

  var bars=[];var labels=[];
  var step=Math.max(Math.floor(data.length/8),1);
  data.forEach(function(d,i){
    var x=i*(barW+gap);
    var total=0;types.forEach(function(t){total+=d[t]||0;});
    var y=padT+chartH;
    types.forEach(function(t,ti){
      var v=d[t]||0;if(!v)return;
      var bh=Math.max(Math.round((v/maxVal)*chartH),2);

    });
    if(i%step===0){

    }
  });

  return e("div",{ref:ref,style:{width:"100%",height:"100%"}},
    e("svg",{width:W,height:H,viewBox:"0 0 "+W+" "+H},
      bars,labels,
      e("line",{x1:0,y1:padT+chartH,x2:W,y2:padT+chartH,stroke:BD,strokeWidth:1})
    )
  );
}

/* ── Donut SVG ────────────────────────────────────────── */
function Donut(p){

    var x1=cx+r*Math.cos(s),y1=cy+r*Math.sin(s),x2=cx+r*Math.cos(en),y2=cy+r*Math.sin(en);
    var ix1=cx+r2*Math.cos(en),iy1=cy+r2*Math.sin(en),ix2=cx+r2*Math.cos(s),iy2=cy+r2*Math.sin(s);
    angle+=sw;return{d:"M "+x1+" "+y1+" A "+r+" "+r+" 0 "+lg+" 1 "+x2+" "+y2+" L "+ix1+" "+iy1+" A "+r2+" "+r2+" 0 "+lg+" 0 "+ix2+" "+iy2+" Z",color:d.color};
  });
  return e("svg",{viewBox:"0 0 "+sz+" "+sz,style:{width:"100%",maxWidth:sz,height:"auto"}},paths.map(function(pp,i){return e("path",{key:i,d:pp.d,fill:pp.color,opacity:.85});}),e("text",{x:cx,y:cy-1,textAnchor:"middle",fill:TX,fontSize:sz*.16,fontWeight:800,fontFamily:"monospace"},total),e("text",{x:cx,y:cy+sz*.1,textAnchor:"middle",fill:TM,fontSize:sz*.08},"total"));
